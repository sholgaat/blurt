services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.backend
    # No ports published intentionally: the backend is only reachable from
    # within the Docker Compose network (http://backend:8000). The bot
    # container reaches it via the service name. This keeps the API
    # internal-only without needing a firewall rule.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  bot-discord:
    profiles: [discord]
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.bot
    environment:
      BOT_PROVIDER: discord
    depends_on:
      backend:
        condition: service_healthy

  bot-telegram:
    profiles: [telegram]
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.bot
    environment:
      BOT_PROVIDER: telegram
    depends_on:
      backend:
        condition: service_healthy
